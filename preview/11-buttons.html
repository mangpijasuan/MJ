<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .btn { font-family:var(--font-sans); font-weight:500; font-size:14px; line-height:1;
         padding:12px 20px; border-radius:2px; border:1px solid transparent; cursor:pointer;
         transition: all var(--dur) var(--ease); }
  .btn.primary { background:var(--accent); color:var(--navy-1); }
  .btn.primary:hover { background:var(--accent-hover); }
  .btn.ghost { background:transparent; color:var(--fg-1); border-color:var(--border-strong); }
  .btn.ghost:hover { background:var(--surface); }
  .btn.text { background:transparent; color:var(--accent); padding:12px 0; }
  .btn.text:hover { color:var(--accent-hover); text-decoration: underline; text-underline-offset:3px; }
</style>
</head><body>
<div class="card">
  <div class="grid-3" style="gap:12px;align-items:start">
    <div><button class="btn primary">Download PDF</button><div class="swatch-label" style="margin-top:8px">primary</div></div>
    <div><button class="btn ghost">View on GitHub</button><div class="swatch-label" style="margin-top:8px">ghost</div></div>
    <div><button class="btn text">Read more →</button><div class="swatch-label" style="margin-top:8px">text</div></div>
  </div>
  <div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border)">
    <div class="swatch-label">Press: translateY(1px). Focus: 3px emerald halo. No scale, no bounce.</div>
  </div>
</div>
</body></html>
