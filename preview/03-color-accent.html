<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="grid-5">
    <div>
      <div class="swatch" style="background:#E8B866;color:#0B1A33">#E8B866</div>
      <div class="swatch-name">accent</div>
      <div class="swatch-label">links, focus</div>
    </div>
    <div>
      <div class="swatch" style="background:#F2C77C;color:#0B1A33">#F2C77C</div>
      <div class="swatch-name">accent-hover</div>
      <div class="swatch-label">hover</div>
    </div>
    <div>
      <div class="swatch dark" style="background:#23304A">#23304A</div>
      <div class="swatch-name">accent-tint</div>
      <div class="swatch-label">pill fill</div>
    </div>
    <div>
      <div class="swatch" style="background:#E8B866;color:#0B1A33">#E8B866</div>
      <div class="swatch-name">mark</div>
      <div class="swatch-label">highlight</div>
    </div>
    <div>
      <div class="swatch dark" style="background:#3A3220">#3A3220</div>
      <div class="swatch-name">mark-tint</div>
      <div class="swatch-label">soft highlight</div>
    </div>
  </div>
</div>
</body></html>
