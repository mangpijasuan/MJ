<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .pill { display:inline-flex; align-items:center; gap:6px; font-family:var(--font-sans); font-size:13px; font-weight:500;
          padding:5px 12px; border-radius:999px; background:var(--accent-tint); color:var(--accent); }
  .pill.plain { background:var(--surface); color:var(--fg-2); }
  .inline-link { color:var(--accent); text-decoration: underline; text-underline-offset:3px; font-weight:500; }
  .inline-link:hover { color:var(--accent-hover); }
</style>
</head><body>
<div class="card">
  <div class="stack" style="gap:14px">
    <div style="display:flex;flex-wrap:wrap;gap:8px">
      <span class="pill">QuickBooks</span>
      <span class="pill">Excel</span>
      <span class="pill">Python</span>
      <span class="pill plain">OSHA</span>
      <span class="pill plain">HIPAA</span>
      <span class="pill plain">Lean</span>
    </div>
    <div style="font-family:var(--font-sans);font-size:15px;color:var(--fg-2);line-height:1.6">
      Reach me at <a class="inline-link" href="#">mangpi.jasuan@gmail.com</a> or find my code <a class="inline-link" href="#">on GitHub</a>.
    </div>
    <div class="swatch-label">Pills · r-pill · accent-tint or paper-2. Links · underlined, emerald.</div>
  </div>
</div>
</body></html>
