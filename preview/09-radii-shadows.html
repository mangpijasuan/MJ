<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="grid-3">
    <div style="text-align:center">
      <div style="width:100%;height:60px;background:var(--surface);border-radius:0;box-shadow:var(--shadow-0);border:1px solid var(--border)"></div>
      <div class="swatch-name" style="margin-top:8px">r-0 / shadow-0</div>
      <div class="swatch-label">default surface</div>
    </div>
    <div style="text-align:center">
      <div style="width:100%;height:60px;background:var(--surface);border-radius:2px;box-shadow:var(--shadow-1)"></div>
      <div class="swatch-name" style="margin-top:8px">r-1 / shadow-1</div>
      <div class="swatch-label">subtle lift</div>
    </div>
    <div style="text-align:center">
      <div style="width:100%;height:60px;background:var(--surface);border-radius:4px;box-shadow:var(--shadow-2)"></div>
      <div class="swatch-name" style="margin-top:8px">r-2 / shadow-2</div>
      <div class="swatch-label">hovered card</div>
    </div>
    <div style="text-align:center">
      <div style="width:100%;height:60px;background:var(--surface);border-radius:8px;box-shadow:var(--shadow-3)"></div>
      <div class="swatch-name" style="margin-top:8px">r-3 / shadow-3</div>
      <div class="swatch-label">floating popover</div>
    </div>
    <div style="text-align:center">
      <div style="width:100%;height:60px;background:var(--surface);border-radius:999px;box-shadow:var(--shadow-1)"></div>
      <div class="swatch-name" style="margin-top:8px">r-pill</div>
      <div class="swatch-label">tags · chips</div>
    </div>
    <div style="text-align:center">
      <div style="width:100%;height:60px;background:var(--surface);border-radius:2px;box-shadow:var(--ring)"></div>
      <div class="swatch-name" style="margin-top:8px">ring</div>
      <div class="swatch-label">focus halo</div>
    </div>
  </div>
</div>
</body></html>
