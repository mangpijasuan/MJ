<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mangpi D Jasuan</title>
<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#0B1A33"/>
    <text x="50" y="62" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-weight="500" fill="#E8B866">MJ</text>
  </svg>
</template>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--fg-2); }
  * { box-sizing: border-box; }
  .content { max-width: 760px; margin: 0 auto; padding: 0 32px; }
  html { scroll-behavior: smooth; }
  @media (max-width: 640px) {
    .content { padding: 0 20px; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="data.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Button.jsx"></script>
<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="SectionHeader.jsx"></script>
<script type="text/babel" src="ExperienceItem.jsx"></script>
<script type="text/babel" src="EducationItem.jsx"></script>
<script type="text/babel" src="SkillGroup.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const data = window.resumeData;
  const [scrolled, setScrolled] = useState(false);

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 40);
    window.addEventListener("scroll", onScroll);
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  useEffect(() => { lucide.createIcons(); });

  return (
    <div>
      <Nav scrolled={scrolled} />
      <Hero data={data} />

      <SectionHeader id="about" eyebrow="About" title="A short introduction" />
      <div className="content">
        <p style={{
          fontFamily: "var(--font-sans)", fontSize: 17, lineHeight: 1.65,
          color: "var(--fg-2)", margin: 0, textWrap: "pretty",
        }}>
          I'm a computer science student at Northeastern State University with a minor in finance, currently finishing an associate's from Tulsa Community College. By day I work at Whirlpool Corporation as a Process Technician and EHS Coordinator — a role built on careful records, clean data, and steady improvement. Outside of that I serve as Treasurer for Zomi Community USA, where I run the books end-to-end in QuickBooks Online.
        </p>
        <p style={{
          fontFamily: "var(--font-sans)", fontSize: 17, lineHeight: 1.65,
          color: "var(--fg-2)", marginTop: 16, textWrap: "pretty",
        }}>
          I'm looking for internships and entry-level roles where operations, numbers, and software all meet.
        </p>
      </div>

      <SectionHeader id="experience" eyebrow="Experience" title="Where I've worked" />
      <div className="content">
        {data.experience.map((it, i) => <ExperienceItem key={i} item={it} />)}
      </div>

      <SectionHeader id="education" eyebrow="Education" title="Schooling" />
      <div className="content">
        {data.education.map((it, i) => <EducationItem key={i} item={it} />)}
      </div>

      <SectionHeader id="skills" eyebrow="Skills" title="Tools of the trade" />
      <div className="content">
        {data.skills.map((g, i) => <SkillGroup key={i} group={g} />)}
      </div>

      <SectionHeader id="volunteer" eyebrow="Volunteer" title="Community" />
      <div className="content">
        {data.volunteer.map((it, i) => <ExperienceItem key={i} item={it} />)}
      </div>

      <Footer data={data} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
